global
    log /dev/log local0
    maxconn 4096
    user haproxy
    group haproxy

defaults
    log global
    mode http
    option httplog
    option dontlognull
    retries 3
    timeout connect 5s
    timeout client 50s
    timeout server 50s
    timeout http-request 10s

frontend zabbix_frontend
    bind *:80
    mode http
    option forwardfor
    default_backend zabbix_servers

backend zabbix_servers
    mode http
    balance roundrobin
    option httpchk GET /zabbix.php

    server zabbix-node1 NODE1-IP:80 check fall 3 rise 2
    server zabbix-node2 NODE2-IP:80 check fall 3 rise 2